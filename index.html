<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المعهد</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
}

.splash{
text-align:center;
width:90%;
max-width:400px;
}

.logo{
width:130px;
height:130px;
object-fit:contain;
margin-bottom:20px;
}

.institute-name{
font-size:30px;
font-weight:bold;
margin-bottom:30px;
color:#333;
}

.progress-container{
width:100%;
height:12px;
background:#ddd;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#2196F3;
border-radius:50px;
animation:loading 3s linear forwards;
}

@keyframes loading{
from{
width:0%;
}
to{
width:100%;
}
}

</style>
</head>
<body>

<div class="splash">

<img id="logo" class="logo" src="logo.png">

<div id="instituteName" class="institute-name">
معهد المستقبل
</div>

<div class="progress-container">
<div class="progress"></div>
</div>

</div>

<script>

// بيانات المعهد
const institute = {
name: "معهد المستقبل",
logo: "logo.png"
};

document.getElementById("instituteName").innerText = institute.name;
document.getElementById("logo").src = institute.logo;

// تحويل بعد التحميل
setTimeout(()=>{
window.location.href="login.html";
},3000);

</script>

</body>
</html>
