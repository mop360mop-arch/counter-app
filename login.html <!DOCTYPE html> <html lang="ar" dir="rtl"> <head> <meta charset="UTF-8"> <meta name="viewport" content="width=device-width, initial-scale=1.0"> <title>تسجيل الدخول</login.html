<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>

body{
font-family:Cairo,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#2196F3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="card">

<h2>تسجيل الدخول</h2>

<input type="text" placeholder="اسم المستخدم">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

</div>

</body>
</html>
